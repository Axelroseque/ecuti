<body class="font-body bg-surface text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Background Layer -->
<div class="absolute inset-0 bg-judicial-gradient z-0"></div>
<div class="absolute inset-0 wave-pattern z-1 opacity-40"></div>
<!-- Ornamental Elements -->
<div class="absolute top-[-10%] left-[-5%] w-[40rem] h-[40rem] bg-primary-container/20 rounded-full blur-[120px] z-2"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[35rem] h-[35rem] bg-secondary-container/10 rounded-full blur-[100px] z-2"></div>
<main class="relative z-10 w-full max-w-md px-6 py-12">
<!-- Brand Identity -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center p-4 rounded-xl bg-white/10 backdrop-blur-md mb-6 border border-white/10">
<img alt="PN Kediri Logo" class="h-20 w-auto" data-alt="Official gold and green seal of the Supreme Court of Indonesia with intricate judicial symbolic details on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpdynOEslyZcZBjD6ObJ1V_T4NmmZ7fv4Y2BixgwpKM_cbSQXZ6pQec19SMKqMQEPotJBqYXoMgG1t1LmmXUGq6sbuGxC6LeI22DeAz_1B31_TUHqPIVYgfKHTcMhaTqzwT3Xe2Z6v8c4yMNQ6KIi8iFFbJ5HNviA35zq1hWfM9qVTlfjw4Hp6h7q5HQbPwQ4aKcXynpzzTW9FZuvJUgHNI0mE4RH44vu6UhrqsCnkNDot0SSb_3g8-qYDqOM9kKb14i_95vB4mlE"/>
</div>
<h1 class="text-white font-headline font-bold text-xl tracking-tight leading-snug px-4">
                Sistem Informasi Cuti<br/>
<span class="text-secondary-fixed">Pengadilan Negeri Kediri Kelas I-B</span>
</h1>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl overflow-hidden border border-white/20">
<div class="p-8 md:p-10">
<form action="#" class="space-y-6" method="POST">
<!-- NIP Input -->
<div>
<label class="block text-[10px] font-mono uppercase tracking-widest text-on-surface-variant mb-2" for="nip">Nomor Induk Pegawai (NIP)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="badge">badge</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-highest border-none rounded focus:ring-2 focus:ring-primary/20 text-on-surface font-mono text-sm placeholder:text-outline/50 transition-all" id="nip" name="nip" placeholder="19870101 201101 1 001" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="block text-[10px] font-mono uppercase tracking-widest text-on-surface-variant" for="password">Kata Sandi</label>
<a class="text-[10px] font-mono uppercase tracking-widest text-primary hover:text-primary-container transition-colors" href="#">Lupa Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-highest border-none rounded focus:ring-2 focus:ring-primary/20 text-on-surface font-mono text-sm placeholder:text-outline/50 transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary/30 bg-surface-container-highest" id="remember" name="remember" type="checkbox"/>
<label class="ml-2 text-xs text-on-surface-variant font-medium" for="remember">Ingat Saya</label>
</div>
<!-- Submit Button -->
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-sm tracking-widest rounded-lg shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        MASUK
                        <span class="material-symbols-outlined text-sm" data-icon="login">login</span>
</button>
</form>
</div>
<!-- Footer decoration -->
<div class="h-1 w-full bg-gradient-to-r from-transparent via-secondary-container to-transparent opacity-30"></div>
</div>
